<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Bhagavad Gita — Layouts</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />

<style>
  :root{
    --red1:#FF5252;
    --red2:#FB9A6A;
    --red3:#C94545;
    --gray1:#4A4A4A;
    --gray2:#9B9B9B;
    --gray3:#C7C7CC;
    --gray4:#E8E8E8;
    --gray5:#F9F9F9;
    --black20:rgba(0,0,0,0.2);
    --white30:rgba(255,255,255,0.3);
  }
  html, body { margin:0; background:#0e0e10; color:#fff; font-family: 'PT Sans', system-ui, sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }
  .gita-screen { font-family: 'PT Sans', sans-serif; color: var(--gray1); }
  .sanskrit { font-family: 'Noto Sans Devanagari', serif; }
</style>
</head>

<div id="root"></div>
