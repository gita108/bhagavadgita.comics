name: mbharata_client
description: Modern Flutter client for Mahabharata.pro with comprehensive feature set
version: 2.0.2

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI & Navigation
  cupertino_icons: ^1.0.8
  go_router: ^12.0.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  
  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.0
  
  # Network & API
  dio: ^5.4.0
  http: ^1.1.2
  json_annotation: ^4.8.1
  logger: ^2.0.2
  connectivity_plus: ^7.0.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  
  # Media & Graphics
  video_player: ^2.8.2
  chewie: ^1.7.4
  vector_math: ^2.1.4
  
  # Audio & Sound
  just_audio: ^0.9.36
  audio_session: ^0.1.16
  
  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.2.2
  package_info_plus: ^8.0.0
  archive: ^3.4.10
  uuid: ^4.2.2
  equatable: ^2.0.5
  collection: ^1.18.0
  
  # Security
  crypto: ^3.0.5
  
  # Firebase & Analytics
  firebase_core: ^2.24.2
  firebase_analytics: ^10.7.4
  firebase_messaging: ^14.7.9
  firebase_crashlytics: ^3.4.8
  
  # In-App Purchases
  in_app_purchase: ^3.1.11
  
  # Social & Sharing
  share_plus: ^7.2.1
  
  # QR
  qr_flutter: ^4.1.0
  
  # Device
  device_info_plus: ^12.1.0
  permission_handler: ^11.1.0
  sensors_plus: ^4.0.2
  
  # Magento & RADA format support
  flutter_magento:
    path: local_packages/flutter_magento

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  generate: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/sounds/
    - assets/models/
    - assets/textures/
    - assets/fonts/
    - assets/localization/
    - assets/rada/
  
  fonts:
    - family: Proxima
      fonts:
        - asset: assets/fonts/Proxima Nova Regular.otf
        - asset: assets/fonts/Proxima Nova Thin.otf
          weight: 100
        - asset: assets/fonts/Proxima Nova Light.otf
          weight: 300
        - asset: assets/fonts/Proxima Nova Semibold.otf
          weight: 600
        - asset: assets/fonts/Proxima Nova Bold.otf
          weight: 700
    - family: Hindi
      fonts:
        - asset: assets/fonts/hindi.ttf
    - family: Sanskrit
      fonts:
        - asset: assets/fonts/Sanskrit-Regular.ttf
        - asset: assets/fonts/Sanskrit-Bold.ttf
          weight: 700
    - family: Devanagari
      fonts:
        - asset: assets/fonts/Devanagari-Regular.ttf
        - asset: assets/fonts/Devanagari-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 24
  adaptive_icon_background: "#8B0000"
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#8B0000"
    theme_color: "#8B0000"
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icons/app_icon.png"
