name: flutter_magento
description: A comprehensive Flutter plugin for Magento e-commerce platform integration with authentication, cart management, product catalog, orders, and offline support
version: 3.6.2
homepage: https://gitlab.com/libsFlutter/flutter_magento
repository: https://gitlab.com/libsFlutter/flutter_magento
issue_tracker: https://gitlab.com/libsFlutter/flutter_magento/-/issues
documentation: https://gitlab.com/libsFlutter/flutter_magento/-/wikis
topics:
  - magento
  - ecommerce
  - flutter
  - dart
  - api

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  
  # Modern Platform Interface (Dart 3+ base classes)
  plugin_platform_interface: ^2.1.8
  
  # HTTP Client & API Generation
  # Core dependencies
  dio: ^5.4.0
  http: ^1.1.2
  retrofit: ^4.3.0
  
  # State Management
  provider: ^6.1.1
  
  # JSON Serialization & Immutable Models
  json_annotation: ^4.8.1
  freezed_annotation: ^3.1.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  
  # Image Caching & Performance
  cached_network_image: ^3.2.3
  flutter_cache_manager: ^3.3.1
  
  # Required for Dio interceptors and logging
  logging: ^1.2.0
  
  # HTTP/2 and connection management
  http2: ^2.2.1
  http_parser: ^4.0.2
  
  # Network & Connectivity
  connectivity_plus: ^7.0.0
  
  # Device Information
  device_info_plus: ^12.1.0
  
  # Security & Authentication
  crypto: ^3.0.6
  flutter_secure_storage: ^9.2.4
  
  # Logging & Monitoring
  logger: ^2.6.1
  
  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  
  # Offline Support
  path_provider: ^2.1.5
  
  # Real-time Communication
  socket_io_client: ^3.1.2
  
  # Archive/ZIP support for RADA format
  archive: ^3.6.1
  
  # Path operations for RADA format
  path: ^1.9.0
  
  # File operations
  file_picker: ^8.1.4
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code Generation (Latest 2025)
  build_runner: ^2.7.1
  json_serializable: ^6.11.1
  drift_dev: ^2.28.2
  freezed: ^3.2.3
  retrofit_generator: ^10.0.5
  
  # Pigeon for Type-Safe Code Generation
  pigeon: ^26.0.1
  
  # Linting & Code Quality
  flutter_lints: ^6.0.0
  very_good_analysis: ^6.0.0
  
  # Modern Testing (2025)
  mocktail: ^1.0.4
  mockito: ^5.4.4
  test: ^1.26.2
  alchemist: ^0.12.1
  patrol: ^3.19.0
  integration_test:
    sdk: flutter
  
  # Test Coverage & Performance
  coverage: ^1.15.0
  flutter_driver:
    sdk: flutter


flutter:
  # This section identifies this package as a Flutter plugin
  plugin:
    platforms:
      android:
        package: ru.nativemind.flutter.magento.flutter_magento
        pluginClass: FlutterMagentoPlugin
      ios:
        pluginClass: FlutterMagentoPlugin
      linux:
        pluginClass: FlutterMagentoPlugin
      macos:
        pluginClass: FlutterMagentoPlugin
      windows:
        pluginClass: FlutterMagentoPlugin
      web:
        pluginClass: FlutterMagentoPlugin
        fileName: flutter_magento_web.dart

  # To add assets to your plugin package, add an "assets" section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/assets-and-images/#from-packages
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # To add custom fonts to your plugin package, add a "fonts" section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/custom-fonts/#from-packages


